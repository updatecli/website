scms:
  application:
    kind: git
    spec:
      branch: main
      url: https://github.com/example/application.git

sources:
  from-scm:
    name: Get the latest commit from the configured SCM
    kind: gitcommit
    scmid: application
    spec:
      branch: main

  from-url:
    name: Get the latest commit from a Git URL
    kind: gitcommit
    spec:
      branch: main
      depth: 1
      url: https://github.com/example/application.git

  from-path:
    name: Get the latest commit from a local repository
    kind: gitcommit
    spec:
      path: ./application
