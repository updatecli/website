---
name: Show Gitlab scm optimized for large repositories

scms:
  gitlab:
    kind: gitlab
    spec:
      # By default url is set to gitlab.com
      # url: gitlab.com
      owner: "olblak"
      repository: "updatecli"
      branch: main
      depth: 1
      singleBranch: true

sources:
  license:
    name: Retrieve license file content
    kind: file
    scmid: gitlab
    spec:
      file: LICENSE
