baseurl = "/"
canonifyURLs = false
disableAliases = true
disableHugoGeneratorInject = true
enableEmoji = true
enableGitInfo = true
enableRobotsTXT = true
languageCode = "en-US"
rssLimit = 10
summarylength = 20

# Multilingual
defaultContentLanguage = "en"
#disableLanguages = ["de", "nl"]
defaultContentLanguageInSubdir = false

# Doks/Thulite needs hugo_stats.json for PurgeCSS (see module.toml "watching" mount)
[build]
  [build.buildStats]
    enable = true

# Output formats per page kind.
# - searchIndex is required by Doks FlexSearch.
# - REDIRECTS/HEADERS render Netlify _redirects and _headers from the home page.
[outputs]
home = ["html", "rss", "sitemap", "searchIndex", "llms", "REDIRECTS", "HEADERS"]
page = ["html", "markdown"]
section = ["html", "rss", "sitemap"]
taxonomy = ["html", "rss", "sitemap"]
term = ["html", "rss", "sitemap"]

# remove .{ext} from text/netlify
[mediaTypes."text/netlify"]
suffixes = [""]
delimiter = ""

# Doks search index
[outputFormats.searchIndex]
  mediaType = "application/json"
  baseName = "search-index"
  isPlainText = true
  notAlternative = true

# Plain-text page markdown + llms.txt
[outputFormats.markdown]
  baseName = "index"
  isHTML = false
  isPlainText = true
  mediaType = "text/markdown"

[outputFormats.llms]
  baseName = "llms"
  isHTML = false
  isPlainText = true
  mediaType = "text/plain"

# add output format for netlify _redirects
[outputFormats.REDIRECTS]
mediaType = "text/netlify"
baseName = "_redirects"
isPlainText = true
notAlternative = true

# add output format for netlify _headers
[outputFormats.HEADERS]
mediaType = "text/netlify"
baseName = "_headers"
isPlainText = true
notAlternative = true

[security]
  enableInlineShortcodes = false
  [security.exec]
    allow = ['^dart-sass-embedded$', '^dart-sass$', '^sass$', '^git$', '^go$', '^node$', '^npx$', '^postcss$', '^asciidoctor$', '^tailwindcss$']
    osEnv = ['(?i)^(PATH|PATHEXT|APPDATA|TMP|TEMP|TERM)$']
  [security.funcs]
    getenv = ['^HUGO_', '^CI$']
  [security.http]
    methods = ['(?i)GET|POST']
    urls = ['.*']

[caches]
  # getresource now also backs getJSON/getCSV (used by the schema-driven
  # parameter-table shortcodes) as well as Thulite images.
  [caches.getresource]
    dir = ":cacheDir/:project"
    maxAge = -1

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[taxonomies]
  contributor = "contributors"
  plugin = "plugins"
  category = "categories"
  tag = "tags"

[permalinks]
blog = "/blog/:title/"
# docs = "/docs/1.0/:sections[1:]/:title/"

[pagination]
  pagerSize = 7

[minify.tdewolff.html]
  keepComments = true
  keepWhitespace = false

[imaging]
  anchor = "Center"
  bgColor = "#ffffff"
  hint = "photo"
  quality = 85
  resampleFilter = "Lanczos"

[related]
  threshold = 80
  includeNewer = true
  toLower = false
    [[related.indices]]
    name = "categories"
    weight = 100
    [[related.indices]]
    name = "tags"
    weight = 80
    [[related.indices]]
    name = "date"
    weight = 10
